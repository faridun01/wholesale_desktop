services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wholesale_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: file:/app/prisma/dev.db
      JWT_SECRET: ${JWT_SECRET}
      OCR_API_KEY: ${OCR_API_KEY}
      OCR_MODEL: ${OCR_MODEL:-gemini-3-flash-preview}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      - backend_uploads:/app/uploads
      - ./backend/prisma:/app/prisma
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    expose:
      - "3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: wholesale_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  backend_uploads:
